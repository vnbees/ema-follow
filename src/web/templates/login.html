<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — {{ exchange_name }} RSI Bot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #e6edf3;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 28px 24px;
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    .meta { color: #8b949e; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: #0f1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    button {
      width: 100%;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #2ea043; }
    .error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid #f85149;
      color: #f85149;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .warn {
      background: rgba(210, 153, 34, 0.12);
      border: 1px solid #d29922;
      color: #d29922;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ exchange_name }} RSI Bot</h1>
    <p class="meta">Đăng nhập để xem và điều khiển dashboard</p>

    {% if not auth_configured %}
    <div class="warn">Chưa cấu hình DASHBOARD_USERNAME / DASHBOARD_PASSWORD trên server.</div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="username">Email</label>
      <input id="username" type="email" name="username" autocomplete="username" required autofocus>

      <label for="password">Mật khẩu</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>

      <button type="submit">Đăng nhập</button>
    </form>
  </div>
</body>
</html>
